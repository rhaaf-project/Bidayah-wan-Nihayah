<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BidayahWanNihayah Bot — Stats</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #f8f9fa; }
  .stat-num { font-size: 2.75rem; font-weight: 700; line-height: 1; color: #198754; }
  .stat-label { color: #6c757d; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .updated { color: #adb5bd; font-size: 0.8rem; }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1d21; color: #e9ecef; }
    .card { background: #25282d; border-color: #34373c; color: #e9ecef; }
    .stat-num { color: #51cf66; }
    .stat-label, .updated { color: #adb5bd; }
    .text-body-secondary { color: #adb5bd !important; }
    a { color: #51cf66; }
  }
</style>
</head>
<body>

<div class="container py-4" style="max-width:760px">

  <div class="d-flex justify-content-between align-items-end mb-4">
    <div>
      <h1 class="h4 mb-1">BidayahWanNihayah Search</h1>
      <a href="https://t.me/bidaya_nihaya_search_bot" class="text-body-secondary small text-decoration-none">@bidaya_nihaya_search_bot</a>
    </div>
    <button id="refresh" class="btn btn-sm btn-outline-secondary" type="button">refresh</button>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-6 col-md-3">
      <div class="card h-100">
        <div class="card-body text-center">
          <div class="stat-num" id="unique_users">-</div>
          <div class="stat-label mt-2">Unique<br>Users</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card h-100">
        <div class="card-body text-center">
          <div class="stat-num" id="total_queries">-</div>
          <div class="stat-label mt-2">Total<br>Pertanyaan</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card h-100">
        <div class="card-body text-center">
          <div class="stat-num" id="total_starts">-</div>
          <div class="stat-label mt-2">Bot<br>Dibuka</div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card h-100">
        <div class="card-body text-center">
          <div class="stat-num" id="total_events">-</div>
          <div class="stat-label mt-2">Total<br>Pesan</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h6 class="text-body-secondary mb-3" style="text-transform:uppercase;letter-spacing:0.05em;font-size:0.8rem">Breakdown per tipe</h6>
      <div class="d-flex justify-content-between py-2 border-bottom">
        <span>/start</span><strong id="b_start">-</strong>
      </div>
      <div class="d-flex justify-content-between py-2 border-bottom">
        <span>/tanya</span><strong id="b_tanya">-</strong>
      </div>
      <div class="d-flex justify-content-between py-2 border-bottom">
        <span>pesan langsung</span><strong id="b_plain">-</strong>
      </div>
      <div class="d-flex justify-content-between py-2">
        <span>/help</span><strong id="b_help">-</strong>
      </div>
    </div>
  </div>

  <div class="updated text-center mb-3" id="updated">loading…</div>

</div>

<script>
  // GANTI URL di bawah ini sama URL stats lo (yang ada WEBHOOK_SECRET-nya, ditambah .json)
  const STATS_URL = "https://bidaya-bot.fajar-mulyawan.workers.dev/stats/sVDKcPnj69_W66SBtIurAer4WbGeGVpS.json";

  async function load() {
    const updated = document.getElementById('updated');
    updated.textContent = 'memuat...';
    try {
      const r = await fetch(STATS_URL, { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      document.getElementById('unique_users').textContent = d.unique_users;
      document.getElementById('total_queries').textContent = d.total_queries;
      document.getElementById('total_starts').textContent = d.total_starts;
      document.getElementById('total_events').textContent = d.total_events;
      document.getElementById('b_start').textContent = d.breakdown.start;
      document.getElementById('b_tanya').textContent = d.breakdown.tanya;
      document.getElementById('b_plain').textContent = d.breakdown.plain;
      document.getElementById('b_help').textContent = d.breakdown.help;
      updated.textContent = 'last updated ' + new Date().toLocaleString('id-ID');
    } catch (e) {
      updated.textContent = 'error: ' + e.message;
    }
  }

  document.getElementById('refresh').addEventListener('click', load);
  load();
  setInterval(load, 30000);  // auto-refresh tiap 30 detik
</script>

</body>
</html>
